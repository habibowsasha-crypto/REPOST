[tool.ruff]
target-version = "py310"
line-length = 120
exclude = [
    "tests",
    ".venv",
    "__pycache__",
    ".git",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "W",   # pycodestyle warnings
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
]
ignore = [
    "E501",  # line too long — handled by formatter
    "B008",  # do not perform function calls in default arguments
    "B904",  # raise from inside except — noisy for existing code
    "UP007", # use X | Y for type unions — requires Python 3.10+ annotations everywhere
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

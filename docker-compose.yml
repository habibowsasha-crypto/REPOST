services:
  bot:
    build: .
    env_file: .env
    restart: unless-stopped
    volumes:
      # Persist the SQLite database — losing it means re-authorising every account
      - sessions_db:/app/sessions.db
      # Persist Telethon bot session file so the bot session survives restarts
      - bot_session:/app/bot.session
      # Persist per-user session files loaded at runtime
      - user_sessions:/app/.sessions
      # Persist log files across restarts
      - logs:/app/logs

volumes:
  sessions_db:
  bot_session:
  user_sessions:
  logs:
